<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RTerritorio</title>
  <meta name="description" content="App para registrar territorios, sincronizada con Google Sheets">
  <meta name="theme-color" content="#F2F2F7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RTerritorio">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>

  <div id="app-content">
    <header>
      <div class="header-content">
        <div class="header-left">
          <h1>RTerritorio</h1>
          <p>Registro de Territorios</p>
        </div>
      </div>
    </header>

    <div id="offline-banner" class="offline-banner" style="display:none;">
      Sin conexion — los registros se guardaran localmente
    </div>

    <main>
      <section id="wizard-section">
        <div class="progress-bar">
          <div class="progress-step active" id="progress-1">1</div>
          <div class="progress-line" id="line-1"></div>
          <div class="progress-step" id="progress-2">2</div>
          <div class="progress-line" id="line-2"></div>
          <div class="progress-step" id="progress-3">3</div>
        </div>

        <div id="step-1" class="wizard-step">
          <h2>Nombre del publicador</h2>
          <div class="form-group">
            <input type="text" id="step-nombre" required placeholder="Escribe tu nombre">
          </div>
          <button type="button" id="btn-step1-next" class="btn btn-primary btn-full">Siguiente</button>
        </div>

        <div id="step-2" class="wizard-step" style="display:none;">
          <h2>Territorio</h2>
          <div class="form-group">
            <input type="text" id="step-territorio" placeholder="Nombre del territorio">
          </div>
          <div class="gps-divider">
            <span>o</span>
          </div>
          <button type="button" id="btn-step2-gps" class="btn btn-gps-full">
            &#128205; Usar ubicacion GPS actual
          </button>
          <div id="step2-gps-status" class="gps-status" style="display:none;"></div>
          <div class="form-actions-step">
            <button type="button" id="btn-step2-back" class="btn btn-secondary">Atras</button>
            <button type="button" id="btn-step2-next" class="btn btn-primary">Siguiente</button>
          </div>
        </div>

        <div id="step-3" class="wizard-step" style="display:none;">
          <h2>Fechas</h2>
          <div class="form-grid">
            <div class="form-group">
              <label for="step-fechaInicio">Fecha de Inicio</label>
              <input type="date" id="step-fechaInicio" required>
            </div>
            <div class="form-group">
              <label for="step-fechaFin">Fecha de Fin</label>
              <input type="date" id="step-fechaFin">
            </div>
          </div>
          <div class="form-actions-step">
            <button type="button" id="btn-step3-back" class="btn btn-secondary">Atras</button>
            <button type="button" id="btn-step3-submit" class="btn btn-primary">Registrar</button>
          </div>
          <button type="button" id="btn-cancelar" class="btn btn-cancel-full">Cancelar</button>
        </div>
      </section>

      <section id="edit-section" style="display:none;">
        <h2>Editar Registro</h2>
        <div class="form-group">
          <label for="edit-nombre">Nombre</label>
          <input type="text" id="edit-nombre" required>
        </div>
        <div class="form-group">
          <label for="edit-territorio">Territorio</label>
          <input type="text" id="edit-territorio" required>
        </div>
        <div class="form-group gps-group">
          <label>Posicion GPS</label>
          <div class="gps-row">
            <input type="text" id="edit-gps" readonly placeholder="Sin ubicacion" class="gps-input">
            <button type="button" id="btn-edit-gps" class="btn btn-gps" title="Obtener ubicacion">&#128205;</button>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="edit-fechaInicio">Fecha de Inicio</label>
            <input type="date" id="edit-fechaInicio" required>
          </div>
          <div class="form-group">
            <label for="edit-fechaFin">Fecha de Fin</label>
            <input type="date" id="edit-fechaFin">
          </div>
        </div>
        <div class="form-actions-step">
          <button type="button" id="btn-edit-cancel" class="btn btn-secondary">Cancelar</button>
          <button type="button" id="btn-edit-save" class="btn btn-primary">Guardar</button>
        </div>
      </section>

      <section id="table-section" style="display:none;">
        <div class="table-header">
          <input type="text" id="buscador" placeholder="Buscar...">
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Territorio</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>GPS</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="registros">
            </tbody>
          </table>
        </div>
        <p id="no-records" class="no-records" style="display:none;">No hay registros</p>
        <button type="button" id="btn-nuevo" class="btn btn-primary btn-full btn-nuevo">+ Nuevo Registro</button>
      </section>
    </main>

    <footer>
      <p>Sincronizado con Google Sheets</p>
    </footer>
  </div>

  <div id="notification" class="notification"></div>

  <div id="update-banner" class="update-banner" style="display:none;">
    <span>Nueva version disponible</span>
    <button id="btnUpdate" class="btn btn-primary btn-update">Actualizar</button>
  </div>

  <div id="confirm-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <p>¿Eliminar este registro?</p>
      <div class="modal-actions">
        <button id="btnConfirmarEliminar" class="btn btn-danger">Eliminar</button>
        <button id="btnCancelarEliminar" class="btn btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/export.js"></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "52386d1d-b594-4ee9-b416-6e2a343889ef",
        notifyButton: { enable: false }
      });
      await OneSignal.Slidedown.promptPush();
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("OneSignalSDKWorker.js");
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
